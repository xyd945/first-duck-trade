---
# Multi-instance Freqtrade setup for Strategy Factory
# Each strategy runs in its own container with isolated DB, port, and config.
# The orchestrator manages regime detection, strategy generation, and lifecycle.

services:
  # ==========================================================================
  # Strategy Instance: LiquiditySweepStrategy (ranging/mean-reversion)
  # ==========================================================================
  freqtrade-sweep:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: ft-sweep
    volumes:
      - "./user_data:/freqtrade/user_data"
    environment:
      # So generated strategies' `from indicators.* import ...` resolves
      # from the bind-mounted user_data/indicators/ package.
      - PYTHONPATH=/freqtrade/user_data
      # Secrets used by render_config.py to materialize config-sweep.json
      # from its committed template at container startup. The ${VAR:-}
      # default-empty form lets docker compose start; the render script
      # fails fast with a clear error if any required var is missing.
      - OKX_API_KEY=${OKX_API_KEY:-}
      - OKX_API_SECRET=${OKX_API_SECRET:-}
      - OKX_API_PASSPHRASE=${OKX_API_PASSPHRASE:-}
      - FT_SWEEP_JWT_SECRET=${FT_SWEEP_JWT_SECRET:-}
      - FT_SWEEP_API_PASSWORD=${FT_SWEEP_API_PASSWORD:-}
    ports:
      - "127.0.0.1:8081:8080"
    # Render the runtime config to /tmp (container-only, NOT host-mounted)
    # before exec'ing freqtrade. The previous version wrote into
    # user_data/configs/, which is bind-mounted from the host — so the
    # cleartext secrets ended up on host disk anyway. /tmp inside the
    # container is ephemeral, owner-only via chmod 0600 from the render
    # script, and gone on container restart. exec replaces the shell so
    # signal handling and restart-on-crash behave exactly as before.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        python /freqtrade/user_data/scripts/render_config.py \
          /freqtrade/user_data/configs/config-sweep.json.template \
          /tmp/config-sweep.json
        exec freqtrade trade \
          --logfile /freqtrade/user_data/logs/ft-sweep.log \
          --db-url sqlite:////freqtrade/user_data/tradesv3-sweep.sqlite \
          --config /tmp/config-sweep.json \
          --strategy LiquiditySweepStrategy

  # ==========================================================================
  # Strategy Instance: MomentumTrendStrategy (trending/breakout)
  # ==========================================================================
  freqtrade-momentum:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: ft-momentum
    volumes:
      - "./user_data:/freqtrade/user_data"
    environment:
      - PYTHONPATH=/freqtrade/user_data
      - OKX_API_KEY=${OKX_API_KEY:-}
      - OKX_API_SECRET=${OKX_API_SECRET:-}
      - OKX_API_PASSPHRASE=${OKX_API_PASSPHRASE:-}
      - FT_MOMENTUM_JWT_SECRET=${FT_MOMENTUM_JWT_SECRET:-}
      - FT_MOMENTUM_API_PASSWORD=${FT_MOMENTUM_API_PASSWORD:-}
    ports:
      - "127.0.0.1:8082:8080"
    # See ft-sweep above for the /tmp-render rationale — same pattern.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        python /freqtrade/user_data/scripts/render_config.py \
          /freqtrade/user_data/configs/config-momentum.json.template \
          /tmp/config-momentum.json
        exec freqtrade trade \
          --logfile /freqtrade/user_data/logs/ft-momentum.log \
          --db-url sqlite:////freqtrade/user_data/tradesv3-momentum.sqlite \
          --config /tmp/config-momentum.json \
          --strategy MomentumTrendStrategy

  # ==========================================================================
  # Backtest Runner (on-demand, not always running)
  # Used by the orchestrator to evaluate candidate strategies
  # ==========================================================================
  freqtrade-backtest:
    image: freqtradeorg/freqtrade:stable
    container_name: ft-backtest
    profiles:
      - backtest  # Only starts when explicitly requested
    volumes:
      - "./user_data:/freqtrade/user_data"
    environment:
      - PYTHONPATH=/freqtrade/user_data
    # Network needed to load exchange markets data during backtesting.
    # LLM-generated strategy code is validated (no network/file I/O calls allowed).
    # Resource limits to prevent runaway generated code
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    command: >
      backtesting
      --config /freqtrade/user_data/config.json
      --strategy SampleStrategy
      --timeframe 1h

  # ==========================================================================
  # Orchestrator: APScheduler-based job manager
  # ==========================================================================
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    restart: unless-stopped
    container_name: ft-orchestrator
    volumes:
      - "./user_data:/app/user_data"
      - "./docker-compose.yml:/app/docker-compose.yml:ro"  # Needed by backtest_runner
      - "./tests:/app/tests:ro"  # So `docker exec ft-orchestrator pytest tests/` works
      - "/var/run/docker.sock:/var/run/docker.sock"  # Docker socket for container management
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - ORCHESTRATOR_MODE=${ORCHESTRATOR_MODE:-dry-run}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - HOST_PROJECT_DIR=${PWD}
      # Must MATCH the values rendered into the corresponding freqtrade
      # configs; the orchestrator uses these for HTTP basic auth against
      # the per-instance REST APIs.
      - FT_MOMENTUM_API_PASSWORD=${FT_MOMENTUM_API_PASSWORD:-}
      - FT_SWEEP_API_PASSWORD=${FT_SWEEP_API_PASSWORD:-}
      # Phase 3 deployment reconciler: needed to populate env on
      # dynamically-spawned ft-deployed-<slug> containers. Same OKX
      # credentials as the legacy momentum/sweep instances.
      - OKX_API_KEY=${OKX_API_KEY:-}
      - OKX_API_SECRET=${OKX_API_SECRET:-}
      - OKX_API_PASSPHRASE=${OKX_API_PASSPHRASE:-}
      - FT_DEPLOYED_JWT_SECRET=${FT_DEPLOYED_JWT_SECRET:-}
      - FT_DEPLOYED_API_PASSWORD=${FT_DEPLOYED_API_PASSWORD:-}
      # Phase 3 acting gates. Both must be set for the reconciler to
      # actually start/stop a container; the empty-allowlist default
      # is the shakedown safety net.
      - RECONCILER_ACTING=${RECONCILER_ACTING:-false}
      - RECONCILER_ALLOWLIST=${RECONCILER_ALLOWLIST:-}
    depends_on:
      - freqtrade-sweep
      - freqtrade-momentum

  # ==========================================================================
  # Monitoring Dashboard
  # ==========================================================================
  monitor:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    restart: unless-stopped
    container_name: ft-monitor
    volumes:
      - "./user_data:/app/user_data"
    ports:
      - "127.0.0.1:8888:8888"
    command: ["python", "/app/user_data/scripts/monitor.py"]
